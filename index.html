<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 AI Prompt 智能寶庫</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f2f7;
    --white: #ffffff;
    --blue: #3b82f6;
    --blue-dark: #2563eb;
    --purple: #8b5cf6;
    --gray-100: #f8f9fa;
    --gray-300: #d1d5db;
    --gray-500: #6b7280;
    --gray-700: #374151;
    --gray-900: #111827;
    --tag-bg: #eff6ff;
    --tag-color: #3b82f6;
    --card-border: #e5e7eb;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --shadow-hover: 0 8px 32px rgba(59,130,246,0.13);
  }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--gray-900);
    min-height: 100vh;
    padding-bottom: 60px;
  }

  /* ── Header ── */
  header {
    text-align: center;
    padding: 48px 20px 32px;
  }
  header h1 {
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    font-weight: 900;
    letter-spacing: -0.5px;
    color: var(--gray-900);
  }
  header .sheet-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    font-size: 0.85rem;
    color: var(--blue);
    text-decoration: none;
    font-weight: 500;
    transition: opacity .2s;
  }
  header .sheet-link:hover { opacity: .75; text-decoration: underline; }

  /* ── Search ── */
  .search-wrap {
    display: flex;
    justify-content: center;
    padding: 0 20px 24px;
  }
  .search-box {
    position: relative;
    width: 100%;
    max-width: 520px;
  }
  .search-box svg {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gray-500);
    pointer-events: none;
  }
  .search-box input {
    width: 100%;
    padding: 13px 20px 13px 44px;
    border-radius: 50px;
    border: 1.5px solid var(--card-border);
    background: var(--white);
    font-size: 1rem;
    font-family: inherit;
    color: var(--gray-900);
    outline: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    transition: border-color .2s, box-shadow .2s;
  }
  .search-box input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
  }
  .search-box input::placeholder { color: var(--gray-500); }

  /* ── Category Filters ── */
  .filters {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    padding: 0 20px 32px;
    max-width: 900px;
    margin: 0 auto;
  }
  .filter-btn {
    padding: 7px 18px;
    border-radius: 50px;
    border: 1.5px solid var(--card-border);
    background: var(--white);
    font-size: 0.875rem;
    font-family: inherit;
    font-weight: 500;
    color: var(--gray-700);
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--blue); color: var(--blue); }
  .filter-btn.active {
    background: var(--blue);
    border-color: var(--blue);
    color: #fff;
    box-shadow: 0 2px 10px rgba(59,130,246,0.35);
  }

  /* ── Section ── */
  .section {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px 40px;
  }
  .section-title {
    font-size: 1.25rem;
    font-weight: 700;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--gray-900);
  }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
  }

  /* ── Card ── */
  .card {
    background: var(--white);
    border-radius: 16px;
    border: 1.5px solid var(--card-border);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    box-shadow: var(--shadow);
    transition: box-shadow .25s, transform .25s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: linear-gradient(180deg, var(--blue), var(--purple));
    border-radius: 4px 0 0 4px;
  }
  .card:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-3px);
  }

  .card-tag {
    display: inline-block;
    background: var(--tag-bg);
    color: var(--tag-color);
    font-size: 0.73rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 50px;
    letter-spacing: 0.3px;
    align-self: flex-start;
  }
  .card-title {
    font-size: 1.15rem;
    font-weight: 800;
    color: var(--gray-900);
    line-height: 1.3;
  }
  .card-body {
    font-size: 0.85rem;
    color: var(--gray-500);
    line-height: 1.65;
    flex: 1;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 6;
    -webkit-box-orient: vertical;
    white-space: pre-wrap;
  }
  .card-btn {
    display: block;
    width: 100%;
    padding: 10px;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 0.9rem;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: background .2s, transform .15s;
    margin-top: auto;
    letter-spacing: 0.3px;
  }
  .card-btn:hover { background: var(--blue-dark); transform: scale(1.02); }
  .card-btn:active { transform: scale(0.98); }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--gray-900);
    color: #fff;
    padding: 11px 24px;
    border-radius: 50px;
    font-size: 0.9rem;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s, transform .3s;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── Loading / Empty ── */
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--gray-500);
    font-size: 1rem;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--card-border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .no-result {
    text-align: center;
    padding: 60px 20px;
    color: var(--gray-500);
    font-size: 1rem;
  }

  /* ── Fade in cards ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card { animation: fadeUp .35s ease both; }

  @media (max-width: 600px) {
    header { padding: 32px 16px 20px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>🚀 AI Prompt 智能寶庫</h1>
  <a class="sheet-link" href="https://docs.google.com/spreadsheets/d/1PrY0n0XJG0tVFwsHeU0XIcBMRvT_gx9T6_RG7bDaUMs/edit?usp=sharing" target="_blank">
    📋 開啟原始資料 Google Sheet
  </a>
</header>

<div class="search-wrap">
  <div class="search-box">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="searchInput" placeholder="搜尋提示詞...">
  </div>
</div>

<div class="filters" id="filtersContainer">
  <button class="filter-btn active" data-cat="全部">全部</button>
</div>

<div class="section">
  <div class="section-title" id="sectionTitle">🧠 AI 協息</div>
  <div id="loadingState" class="loading">
    <div class="spinner"></div>
    正在讀取資料...
  </div>
  <div class="grid" id="grid"></div>
  <div class="no-result" id="noResult" style="display:none">找不到相關的 Prompt，請試試其他關鍵字。</div>
</div>

<div class="toast" id="toast">✅ 已複製 Prompt！</div>

<script>
const SHEET_ID = '1PrY0n0XJG0tVFwsHeU0XIcBMRvT_gx9T6_RG7bDaUMs';
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Sheet1`;

let allData = [];
let activeCategory = '全部';
let searchQuery = '';

// ── Parse CSV (handles quoted fields with commas/newlines) ──
function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuote = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i], next = text[i+1];
    if (inQuote) {
      if (ch === '"' && next === '"') { field += '"'; i++; }
      else if (ch === '"') inQuote = false;
      else field += ch;
    } else {
      if (ch === '"') inQuote = true;
      else if (ch === ',') { row.push(field.trim()); field = ''; }
      else if (ch === '\n') { row.push(field.trim()); rows.push(row); row = []; field = ''; }
      else if (ch === '\r') { /* skip */ }
      else field += ch;
    }
  }
  if (field || row.length) { row.push(field.trim()); rows.push(row); }
  return rows;
}

async function fetchData() {
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error('fetch failed');
    const text = await res.text();
    const rows = parseCSV(text);
    if (rows.length < 2) throw new Error('no data');

    // Detect columns (case-insensitive)
    const headers = rows[0].map(h => h.toLowerCase().replace(/\s/g,''));
    const col = name => headers.findIndex(h => h.includes(name));

    const catIdx   = col('類別') !== -1 ? col('類別')   : col('category') !== -1 ? col('category') : 0;
    const titleIdx = col('標題') !== -1 ? col('標題')   : col('title')    !== -1 ? col('title')    : 1;
    const bodyIdx  = col('內容') !== -1 ? col('內容')   : col('prompt')   !== -1 ? col('prompt')   : 2;

    allData = rows.slice(1)
      .filter(r => r.length > Math.max(catIdx, titleIdx, bodyIdx) && r[titleIdx])
      .map(r => ({
        category: r[catIdx] || '其他',
        title:    r[titleIdx] || '',
        body:     r[bodyIdx]  || '',
      }));

    buildFilters();
    renderGrid();
    document.getElementById('loadingState').style.display = 'none';
  } catch (e) {
    document.getElementById('loadingState').innerHTML =
      '<p style="color:#ef4444">⚠️ 無法讀取 Google Sheet 資料。<br>請確認試算表已設為「任何人都能檢視」。</p>';
    console.error(e);
  }
}

function buildFilters() {
  const cats = ['全部', ...new Set(allData.map(d => d.category).filter(Boolean))];
  const container = document.getElementById('filtersContainer');
  container.innerHTML = '';
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (cat === activeCategory ? ' active' : '');
    btn.dataset.cat = cat;
    btn.textContent = cat;
    btn.addEventListener('click', () => {
      activeCategory = cat;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid();
    });
    container.appendChild(btn);
  });
}

function renderGrid() {
  const query = searchQuery.toLowerCase();
  const filtered = allData.filter(d => {
    const matchCat = activeCategory === '全部' || d.category === activeCategory;
    const matchQ   = !query || d.title.toLowerCase().includes(query) || d.body.toLowerCase().includes(query);
    return matchCat && matchQ;
  });

  const grid = document.getElementById('grid');
  const noResult = document.getElementById('noResult');
  const sectionTitle = document.getElementById('sectionTitle');

  // Update section title
  sectionTitle.textContent = activeCategory === '全部'
    ? '🧠 AI 協助'
    : `🧠 ${activeCategory}`;

  grid.innerHTML = '';
  if (filtered.length === 0) {
    noResult.style.display = 'block';
    return;
  }
  noResult.style.display = 'none';

  filtered.forEach((d, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${Math.min(i, 8) * 40}ms`;
    card.innerHTML = `
      <span class="card-tag">${escHtml(d.category)}</span>
      <div class="card-title">${escHtml(d.title)}</div>
      <div class="card-body">${escHtml(d.body)}</div>
      <button class="card-btn" data-prompt="${escAttr(d.body)}">複製 Prompt</button>
    `;
    card.querySelector('.card-btn').addEventListener('click', e => {
      copyText(e.currentTarget.dataset.prompt);
    });
    grid.appendChild(card);
  });
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast()).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast();
  });
}

function showToast() {
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(str) {
  return str.replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderGrid();
});

fetchData();
</script>
</body>
</html>
