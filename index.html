<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Prompt</title>
  <!-- 導入 Google Fonts (Noto Sans TC & Inter) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <!-- 引入 Tailwind CSS 進行現代化快速排版 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              darkBg: '#090d16',
              sidebarBg: '#0f172a',
              cardBg: 'rgba(15, 23, 42, 0.6)',
              cardBorder: '#1e293b',
              accentStart: '#6366f1',
              accentEnd: '#a855f7',
              highlight: '#06b6d4',
            }
          },
          fontFamily: {
            sans: ['Inter', 'Noto Sans TC', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    /* 絲滑主題色彩轉移（包括背景、文字、卡片、邊框等） */
    body, aside, header, input, .premium-card, button {
      transition: background-color 0.3s cubic-bezier(0.4, 0, 0.2, 1), 
                  border-color 0.3s cubic-bezier(0.4, 0, 0.2, 1), 
                  color 0.2s cubic-bezier(0.4, 0, 0.2, 1), 
                  box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* 自訂美化滾動條 */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    .dark ::-webkit-scrollbar-track {
      background: #090d16;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }
    .dark ::-webkit-scrollbar-thumb {
      background: #1e293b;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
    .dark ::-webkit-scrollbar-thumb:hover {
      background: #334155;
    }
    
    /* 背景極光微光動畫效果（隨主題調整明暗強度） */
    .aurora-bg {
      position: fixed;
      top: -10%;
      left: -10%;
      width: 120%;
      height: 120%;
      background: 
        radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.04) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.03) 0%, transparent 40%);
      z-index: -1;
      pointer-events: none;
    }
    .dark .aurora-bg {
      background: 
        radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.12) 0%, transparent 40%);
    }

    /* 卡片懸停效果 */
    .premium-card {
      position: relative;
    }
    .premium-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px -10px rgba(99, 102, 241, 0.15);
      border-color: rgba(99, 102, 241, 0.25);
    }
    .dark .premium-card:hover {
      border-color: rgba(99, 102, 241, 0.4);
      box-shadow: 0 10px 30px -10px rgba(99, 102, 241, 0.3);
    }
  </style>
</head>
<body class="bg-slate-50 dark:bg-brand-darkBg text-slate-800 dark:text-slate-100 font-sans min-h-screen selection:bg-indigo-500 selection:text-white">

  <!-- 極光背景 -->
  <div class="aurora-bg"></div>

  <!-- 整體容器：左側邊欄 + 右側主內容 -->
  <div class="flex flex-col lg:flex-row min-h-screen">

    <!-- ── 左側固定的 Sidebar ── -->
    <aside class="w-full lg:w-72 bg-white/90 lg:bg-white/80 dark:bg-slate-950/80 dark:lg:bg-slate-950/40 lg:backdrop-blur-xl border-b lg:border-b-0 lg:border-r border-slate-200 dark:border-slate-800/80 lg:sticky lg:top-0 lg:h-screen flex flex-col z-30">
      
      <!-- 標題 Logo 區域 -->
      <div class="p-6 border-b border-slate-200 dark:border-slate-800/60 flex items-center justify-between">
        <div class="flex items-center space-x-3">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-brand-accentStart to-brand-accentEnd flex items-center justify-center shadow-lg shadow-indigo-500/30">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 21L14.907 18M21.17 3.03a1.5 1.5 0 00-2.122 0l-1.34 1.34a21.365 21.365 0 011.666 1.666l1.34-1.34a1.5 1.5 0 000-2.122zM15.42 6.75l-7.23 7.23a1.5 1.5 0 000 2.122l.707.707a1.5 1.5 0 002.122 0l7.23-7.23a1.5 1.5 0 000-2.122l-.707-.707a1.5 1.5 0 00-2.122 0z" />
            </svg>
          </div>
          <div>
            <h1 class="text-xl font-black tracking-tight text-slate-900 dark:text-white">AI Prompt</h1>
            <p class="text-[10px] text-slate-500 dark:text-slate-400 uppercase tracking-widest font-semibold">Workspace</p>
          </div>
        </div>
      </div>

      <!-- 統計數據 -->
      <div class="px-6 py-4 border-b border-slate-200 dark:border-slate-800/40 hidden lg:block">
        <div class="bg-slate-100 dark:bg-slate-900/60 rounded-xl p-3 border border-slate-200/80 dark:border-slate-800/60 flex justify-between items-center">
          <span class="text-xs text-slate-500 dark:text-slate-400">總收錄指令</span>
          <span class="text-sm font-bold text-indigo-600 dark:text-transparent dark:bg-clip-text dark:bg-gradient-to-r dark:from-brand-highlight dark:to-brand-accentEnd" id="statsCount">0</span>
        </div>
      </div>

      <!-- 分類清單區 (行動端水平滾動 / 桌面端垂直滾動) -->
      <div class="flex-1 overflow-y-auto px-4 py-4 lg:py-6">
        <div class="text-xs font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider px-3 mb-3 hidden lg:block">指令分類</div>
        
        <!-- 分類容器 -->
        <nav class="flex lg:flex-col gap-1.5 overflow-x-auto lg:overflow-x-visible pb-3 lg:pb-0" id="filtersContainer">
          <button class="filter-btn active px-4 py-2 rounded-xl text-sm font-medium transition-all duration-200 whitespace-nowrap bg-indigo-600/20 text-indigo-400 border border-indigo-500/30 w-full text-left" data-cat="全部">
            🚀 全部
          </button>
        </nav>
      </div>

      <!-- 底部來源 Google Sheet 連結 -->
      <div class="p-4 border-t border-slate-200 dark:border-slate-800/60 hidden lg:block">
        <a class="flex items-center justify-center space-x-2 w-full py-3 px-4 bg-slate-100 hover:bg-slate-200 dark:bg-slate-900 dark:hover:bg-slate-800 border border-slate-200/80 dark:border-slate-800 rounded-xl text-xs font-medium text-slate-600 dark:text-slate-300 transition-all duration-200" 
           href="https://docs.google.com/spreadsheets/d/1PrY0n0XJG0tVFwsHeU0XIcBMRvT_gx9T6_RG7bDaUMs/edit?usp=sharing" target="_blank">
          <svg class="w-4 h-4 text-emerald-500" fill="currentColor" viewBox="0 0 24 24">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm1.8 14H14v1.8h-1.3V16h-1.8v-1.3h1.8v-1.8H14v1.8h1.8V16zm-5.1-4.7H6v-1.3h4.7v1.3zm2-3.3H6V7h6.7v1zm3.1-3H6V5h9.8v1z"/>
          </svg>
          <span>開啟來源 Google Sheet</span>
        </a>
      </div>
    </aside>

    <!-- ── 右側主內容區域 ── -->
    <main class="flex-1 flex flex-col min-h-screen">

      <!-- ── 頂部導航與搜尋列 (Sticky) ── -->
      <header class="sticky top-0 bg-slate-50/80 dark:bg-brand-darkBg/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800/60 z-20 px-6 py-4 flex items-center justify-between gap-4">
        
        <!-- 搜尋輸入框 -->
        <div class="relative flex-1 max-w-md">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-slate-400 dark:text-slate-500">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
          </span>
          <input type="text" id="searchInput" 
                 class="w-full bg-white dark:bg-slate-900/90 text-slate-800 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 text-sm rounded-xl pl-10 pr-4 py-3 border border-slate-200 dark:border-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500/40 focus:border-indigo-500 transition-all duration-300"
                 placeholder="搜尋關鍵字、標題或 Prompt...">
        </div>

        <!-- 功能控制：主題切換與外部連結 -->
        <div class="flex items-center space-x-3">
          <!-- 💡 淺色/深色主題切換按鈕 -->
          <button id="themeToggle" class="p-3 rounded-xl bg-white dark:bg-slate-900/90 hover:bg-slate-100 dark:hover:bg-slate-800 border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-300 transition-all duration-300 flex items-center justify-center shadow-sm">
            <!-- 月亮圖示 (淺色模式下顯示，指示點擊可切換至深色) -->
            <svg id="moonIcon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
            </svg>
            <!-- 太陽圖示 (深色模式下顯示，指示點擊可切換至淺色) -->
            <svg id="sunIcon" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
            </svg>
          </button>

          <!-- 外部連結 (行動端替代顯示) -->
          <a class="hidden sm:flex lg:hidden items-center space-x-1.5 py-2.5 px-3 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl text-xs font-medium text-slate-600 dark:text-slate-300 shadow-sm" 
             href="https://docs.google.com/spreadsheets/d/1PrY0n0XJG0tVFwsHeU0XIcBMRvT_gx9T6_RG7bDaUMs/edit?usp=sharing" target="_blank">
            <span>📋 資料來源</span>
          </a>
        </div>
      </header>

      <!-- ── 卡片內容展示區 ── -->
      <div class="flex-1 px-6 py-8 max-w-7xl w-full mx-auto">
        
        <!-- 分類主題標題 -->
        <div class="flex items-center justify-between mb-6">
          <div class="flex items-center space-x-3">
            <div class="h-6 w-1 rounded-full bg-gradient-to-b from-brand-accentStart to-brand-accentEnd"></div>
            <h2 class="text-xl font-bold tracking-tight text-slate-800 dark:text-white flex items-center gap-2" id="sectionTitle">
              🧠 AI 協作庫
            </h2>
          </div>
        </div>

        <!-- 骨架載入狀態 -->
        <div id="loadingState" class="py-20 flex flex-col items-center justify-center">
          <div class="w-12 h-12 rounded-full border-4 border-slate-200 dark:border-slate-800 border-t-indigo-500 animate-spin mb-4"></div>
          <p class="text-slate-500 dark:text-slate-400 text-sm">正在從雲端串接 Prompt 資料庫...</p>
        </div>

        <!-- 卡片 Grid 網格 -->
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 hidden" id="grid"></div>

        <!-- 找不到結果提示 -->
        <div class="text-center py-24 hidden" id="noResult">
          <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 mb-4 text-slate-400 dark:text-slate-500 shadow-sm">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.182 16.318A4.486 4.486 0 0012.016 15a4.486 4.486 0 00-3.198 1.318M9 10.5h.008v.008H9V10.5zm6 0h.008v.008H15V10.5zm1.254-8.064a9 9 0 11-12.508 12.508 9 9 0 0112.508-12.508z" />
            </svg>
          </div>
          <p class="text-slate-700 dark:text-slate-400 text-base font-medium">沒有找到任何相符的 Prompt 指令</p>
          <p class="text-slate-400 dark:text-slate-500 text-xs mt-1">試著更換其他關鍵字或變更分類標籤</p>
        </div>

      </div>

    </main>
  </div>

  <!-- ── 輕量優雅 Toast 通知 ── -->
  <div class="toast fixed bottom-6 right-6 translate-y-12 opacity-0 pointer-events-none transition-all duration-300 z-50" id="toast">
    <div class="bg-indigo-600 border border-indigo-400 text-white rounded-xl shadow-2xl px-5 py-3.5 flex items-center space-x-3">
      <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <span class="text-sm font-semibold tracking-wide">Prompt 已成功複製到剪貼簿！</span>
    </div>
  </div>

  <script>
    const SHEET_ID = '1PrY0n0XJG0tVFwsHeU0XIcBMRvT_gx9T6_RG7bDaUMs';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Sheet1`;

    let allData = [];
    let activeCategory = '全部';
    let searchQuery = '';

    // ── 💡 淺色/深色主題邏輯 ──
    const themeToggleBtn = document.getElementById('themeToggle');
    const moonIcon = document.getElementById('moonIcon');
    const sunIcon = document.getElementById('sunIcon');

    function applyTheme() {
      // 偵測 localStorage 設定或系統設定，預設採深色 (dark) 確保原版太空感
      if (localStorage.getItem('theme') === 'light' || 
          (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: light)').matches)) {
        document.documentElement.classList.remove('dark');
        moonIcon.classList.remove('hidden'); // 在白色底顯示月亮圖示 (代表切回深色)
        sunIcon.classList.add('hidden');
      } else {
        document.documentElement.classList.add('dark');
        moonIcon.classList.add('hidden');
        sunIcon.classList.remove('hidden'); // 在深色底顯示太陽圖示 (代表切回淺色)
      }
    }

    themeToggleBtn.addEventListener('click', () => {
      if (document.documentElement.classList.contains('dark')) {
        localStorage.setItem('theme', 'light');
      } else {
        localStorage.setItem('theme', 'dark');
      }
      applyTheme();
    });

    // 啟動載入主題設定
    applyTheme();

    // CSV 剖析器（支援處理欄位內包含換行與逗號的情境）
    function parseCSV(text) {
      const rows = [];
      let row = [], field = '', inQuote = false;
      for (let i = 0; i < text.length; i++) {
        const ch = text[i], next = text[i+1];
        if (inQuote) {
          if (ch === '"' && next === '"') { field += '"'; i++; }
          else if (ch === '"') inQuote = false;
          else field += ch;
        } else {
          if (ch === '"') inQuote = true;
          else if (ch === ',') { row.push(field.trim()); field = ''; }
          else if (ch === '\n') { row.push(field.trim()); rows.push(row); row = []; field = ''; }
          else if (ch === '\r') { /* 忽略 */ }
          else field += ch;
        }
      }
      if (field || row.length) { row.push(field.trim()); rows.push(row); }
      return rows;
    }

    // 非同步資料獲取
    async function fetchData() {
      try {
        const res = await fetch(CSV_URL);
        if (!res.ok) throw new Error('連線獲取 CSV 資料失敗');
        const text = await res.text();
        const rows = parseCSV(text);
        if (rows.length < 2) throw new Error('沒有剖析到任何資料列');

        // 智慧標題偵測 (不分大小寫、去空白)
        const headers = rows[0].map(h => h.toLowerCase().replace(/\s/g,''));
        const col = name => headers.findIndex(h => h.includes(name));

        const catIdx   = col('類別') !== -1 ? col('類別')   : col('category') !== -1 ? col('category') : 0;
        const titleIdx = col('標題') !== -1 ? col('標題')   : col('title')    !== -1 ? col('title')    : 1;
        const bodyIdx  = col('內容') !== -1 ? col('內容')   : col('prompt')   !== -1 ? col('prompt')   : 2;

        allData = rows.slice(1)
          .filter(r => r.length > Math.max(catIdx, titleIdx, bodyIdx) && r[titleIdx])
          .map(r => ({
            category: r[catIdx] || '其他',
            title:    r[titleIdx] || '',
            body:     r[bodyIdx]  || '',
          }));

        // 更新統計總數
        document.getElementById('statsCount').textContent = allData.length;

        buildFilters();
        renderGrid();
        
        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('grid').classList.remove('hidden');
      } catch (e) {
        document.getElementById('loadingState').innerHTML = `
          <div class="text-center max-w-md p-6 bg-red-950/20 border border-red-500/30 rounded-2xl">
            <svg class="w-10 h-10 text-red-500 mx-auto mb-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
            <p class="text-red-400 font-bold mb-1">⚠️ 無法連線讀取 Google Sheet 資料庫</p>
            <p class="text-slate-400 text-xs leading-relaxed">請確認您的 Google 試算表已將權限設定為「任何人知道連結皆可檢視」，且沒有損毀。</p>
          </div>
        `;
        console.error(e);
      }
    }

    // 建立側邊分類導航
    function buildFilters() {
      const cats = ['全部', ...new Set(allData.map(d => d.category).filter(Boolean))];
      const container = document.getElementById('filtersContainer');
      container.innerHTML = '';
      
      cats.forEach(cat => {
        const btn = document.createElement('button');
        const isActive = cat === activeCategory;
        
        // 賦予分類微縮圖示 Emoji (可自訂)
        let emoji = '🔮 ';
        if (cat === '全部') emoji = '🚀 ';
        else if (cat.includes('寫作') || cat.includes('文案')) emoji = '📝 ';
        else if (cat.includes('程式') || cat.includes('工程')) emoji = '💻 ';
        else if (cat.includes('行銷') || cat.includes('企劃')) emoji = '🎯 ';
        else if (cat.includes('設計') || cat.includes('影像')) emoji = '🎨 ';
        else if (cat.includes('翻譯')) emoji = '🌐 ';
        else if (cat.includes('學術') || cat.includes('教育')) emoji = '🎓 ';

        btn.className = `filter-btn px-4 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 whitespace-nowrap text-left flex items-center justify-between w-full ` + 
          (isActive 
            ? 'bg-gradient-to-r from-brand-accentStart to-brand-accentEnd text-white shadow-lg shadow-indigo-500/20' 
            : 'text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-900/60'
          );
        
        btn.dataset.cat = cat;
        
        // 計算該分類底下有多少項目
        const count = cat === '全部' ? allData.length : allData.filter(d => d.category === cat).length;
        
        btn.innerHTML = `
          <span class="flex items-center space-x-2">
            <span>${emoji}</span>
            <span>${cat}</span>
          </span>
          <span class="text-[10px] px-2 py-0.5 rounded-full ${isActive ? 'bg-white/20 text-white' : 'bg-slate-200 text-slate-600 dark:bg-slate-800 dark:text-slate-400'} font-bold">${count}</span>
        `;

        btn.addEventListener('click', () => {
          activeCategory = cat;
          document.querySelectorAll('.filter-btn').forEach(b => {
            b.classList.remove('bg-gradient-to-r', 'from-brand-accentStart', 'to-brand-accentEnd', 'text-white', 'shadow-lg', 'shadow-indigo-500/20');
            b.classList.add('text-slate-600', 'dark:text-slate-400', 'hover:text-slate-900', 'dark:hover:text-slate-200', 'hover:bg-slate-100', 'dark:hover:bg-slate-900/60');
            // 還原計數器樣式
            const badge = b.querySelector('.text-\\[10px\\]');
            if (badge) {
              badge.classList.remove('bg-white/20', 'text-white');
              badge.classList.add('bg-slate-200', 'text-slate-600', 'dark:bg-slate-800', 'dark:text-slate-400');
            }
          });
          
          btn.classList.add('bg-gradient-to-r', 'from-brand-accentStart', 'to-brand-accentEnd', 'text-white', 'shadow-lg', 'shadow-indigo-500/20');
          btn.classList.remove('text-slate-600', 'dark:text-slate-400', 'hover:text-slate-900', 'dark:hover:text-slate-200', 'hover:bg-slate-100', 'dark:hover:bg-slate-900/60');
          
          const activeBadge = btn.querySelector('.text-\\[10px\\]');
          if (activeBadge) {
            activeBadge.classList.add('bg-white/20', 'text-white');
            activeBadge.classList.remove('bg-slate-200', 'text-slate-600', 'dark:bg-slate-800', 'dark:text-slate-400');
          }
          
          renderGrid();
        });
        container.appendChild(btn);
      });
    }

    // 渲染卡片格網
    function renderGrid() {
      const query = searchQuery.toLowerCase();
      const filtered = allData.filter(d => {
        const matchCat = activeCategory === '全部' || d.category === activeCategory;
        const matchQ   = !query || d.title.toLowerCase().includes(query) || d.body.toLowerCase().includes(query);
        return matchCat && matchQ;
      });

      const grid = document.getElementById('grid');
      const noResult = document.getElementById('noResult');
      const sectionTitle = document.getElementById('sectionTitle');

      // 更新主區段標題
      sectionTitle.textContent = activeCategory === '全部'
        ? `🧠 AI 協作庫 (${filtered.length})`
        : `🧠 ${activeCategory} (${filtered.length})`;

      grid.innerHTML = '';
      if (filtered.length === 0) {
        grid.classList.add('hidden');
        noResult.classList.remove('hidden');
        return;
      }
      
      noResult.classList.add('hidden');
      grid.classList.remove('hidden');

      filtered.forEach((d, i) => {
        const card = document.createElement('div');
        // 加入 bg-white 亮底與 dark:bg-slate-900/40 暗底，以及不同陰影特效支援
        card.className = 'premium-card bg-white dark:bg-slate-900/40 border border-slate-200 dark:border-slate-800/80 rounded-2xl p-5 flex flex-col justify-between h-[360px] opacity-0 animate-[fadeUp_0.4s_ease_forwards] shadow-sm dark:shadow-none';
        card.style.animationDelay = `${Math.min(i, 8) * 35}ms`;
        
        card.innerHTML = `
          <div class="flex flex-col h-full justify-between">
            <div>
              <!-- 頂部標籤 -->
              <div class="flex items-center justify-between mb-3">
                <span class="inline-flex items-center px-2.5 py-0.5 rounded-lg text-xs font-semibold bg-indigo-500/10 text-indigo-500 dark:text-indigo-400 border border-indigo-500/20">
                  # ${escHtml(d.category)}
                </span>
              </div>
              
              <!-- 標題 -->
              <h3 class="text-base font-bold text-slate-800 dark:text-white mb-2.5 line-clamp-2 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors duration-200">
                ${escHtml(d.title)}
              </h3>
              
              <!-- 內文 (在亮色主題與暗色主題均能清晰顯示的容器) -->
              <div class="text-slate-600 dark:text-slate-400 text-xs leading-relaxed overflow-y-auto max-h-[160px] pr-1 whitespace-pre-wrap select-all font-mono bg-slate-100/60 dark:bg-slate-950/40 p-3 rounded-xl border border-slate-200 dark:border-slate-900 mb-4">
                ${escHtml(d.body)}
              </div>
            </div>

            <!-- 底層動作按鈕 -->
            <button class="copy-btn flex items-center justify-center space-x-2 w-full py-2.5 px-4 bg-indigo-600 hover:bg-indigo-500 active:scale-95 text-white text-xs font-bold rounded-xl transition-all duration-200 shadow-md shadow-indigo-600/20" 
                    data-prompt="${escAttr(d.body)}">
              <svg class="w-4 h-4 btn-copy-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
              </svg>
              <span class="btn-text">複製 Prompt</span>
            </button>
          </div>
        `;
        
        // 點擊複製邏輯
        const copyBtn = card.querySelector('.copy-btn');
        copyBtn.addEventListener('click', e => {
          const btn = e.currentTarget;
          const icon = btn.querySelector('.btn-copy-icon');
          const textSpan = btn.querySelector('.btn-text');
          const promptText = btn.dataset.prompt;

          copyText(promptText, () => {
            // 一鍵切換按鈕狀態為「已複製成功」
            btn.classList.remove('bg-indigo-600', 'hover:bg-indigo-500');
            btn.classList.add('bg-emerald-600', 'hover:bg-emerald-500');
            textSpan.textContent = '已複製到剪貼簿！';
            icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />`;
            
            // 2 秒後回復按鈕原狀
            setTimeout(() => {
              btn.classList.remove('bg-emerald-600', 'hover:bg-emerald-500');
              btn.classList.add('bg-indigo-600', 'hover:bg-indigo-500');
              textSpan.textContent = '複製 Prompt';
              icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />`;
            }, 2000);
          });
        });

        grid.appendChild(card);
      });
    }

    // 複製文字功能 (相容性與無 iframe 阻擋處理)
    function copyText(text, callback) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text)
          .then(() => {
            showToast();
            if (callback) callback();
          })
          .catch(() => fallbackCopy(text, callback));
      } else {
        fallbackCopy(text, callback);
      }
    }

    function fallbackCopy(text, callback) {
      const ta = document.createElement('textarea');
      ta.value = text;
      // 避免滾動條抖動
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try {
        document.execCommand('copy');
        showToast();
        if (callback) callback();
      } catch (err) {
        console.error('複製失敗：', err);
      }
      document.body.removeChild(ta);
    }

    // 顯示 Toast 訊息
    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.remove('translate-y-12', 'opacity-0', 'pointer-events-none');
      toast.classList.add('translate-y-0', 'opacity-100');
      
      setTimeout(() => {
        toast.classList.remove('translate-y-0', 'opacity-100');
        toast.classList.add('translate-y-12', 'opacity-0', 'pointer-events-none');
      }, 2500);
    }

    // 防堵 XSS 安全轉義
    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function escAttr(str) {
      return str.replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    // 搜尋即時過濾
    document.getElementById('searchInput').addEventListener('input', e => {
      searchQuery = e.target.value;
      renderGrid();
    });

    // 載入動畫對應 CSS
    const styleSheet = document.createElement("style");
    styleSheet.innerText = `
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    `;
    document.head.appendChild(styleSheet);

    // 開始初始化
    fetchData();
  </script>
</body>
</html>
